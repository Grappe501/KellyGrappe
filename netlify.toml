# ----------------------------------------------------
# Netlify Build Configuration
# ----------------------------------------------------

[build]
  base = "app"
  command = "npm run build"
  publish = "dist"

# ----------------------------------------------------
# Environment Settings
# ----------------------------------------------------

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"
  NPM_FLAGS = "--legacy-peer-deps"

# ----------------------------------------------------
# Netlify Functions
# ----------------------------------------------------

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Allow longer runtime for AI / OCR / import tasks
[functions."scan-card"]
  timeout = 26

[functions."followup-ai"]
  timeout = 26

[functions."event-assist"]
  timeout = 26

# ----------------------------------------------------
# SPA Routing (React Router)
# ----------------------------------------------------

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ----------------------------------------------------
# Security Headers
# ----------------------------------------------------

[[headers]]
  for = "/*"

  [headers.values]

  # Prevent iframe embedding
  X-Frame-Options = "DENY"

  # Prevent MIME sniffing
  X-Content-Type-Options = "nosniff"

  # Stronger referrer policy
  Referrer-Policy = "strict-origin-when-cross-origin"

  # Enable device capabilities required for field organizing
  # (camera + geolocation used for canvassing + business cards)
  Permissions-Policy = """
  camera=(self),
  microphone=(self),
  geolocation=(self),
  fullscreen=(self),
  clipboard-read=(self),
  clipboard-write=(self)
  """

  # Basic XSS protection layer
  X-XSS-Protection = "1; mode=block"

  # Content security policy for APIs used in this project
  Content-Security-Policy = """
  default-src 'self';
  img-src 'self' data: blob: https:;
  media-src 'self' blob:;
  font-src 'self' data:;
  style-src 'self' 'unsafe-inline';
  script-src 'self' 'unsafe-inline';
  connect-src
    'self'
    https://*.supabase.co
    https://api.openai.com
    https://maps.googleapis.com
    https://maps.gstatic.com
    https://*.googleapis.com
    https://*.netlify.app
    https://*.twilio.com
    https://api.sendgrid.com;
  frame-src https://*.google.com;
  """

# ----------------------------------------------------
# Static Asset Caching (Vite bundles)
# ----------------------------------------------------

[[headers]]
  for = "/assets/*"

  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ----------------------------------------------------
# Service Worker Cache Control
# ----------------------------------------------------

[[headers]]
  for = "/sw.js"

  [headers.values]
    Cache-Control = "no-cache"

# ----------------------------------------------------
# Manifest Cache Control
# ----------------------------------------------------

[[headers]]
  for = "/manifest.webmanifest"

  [headers.values]
    Cache-Control = "no-cache"